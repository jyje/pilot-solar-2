name: verify-langchain-upstage-deepagents

on:
  push:
    branches: [main]
    paths:
      - "03-langchain-upstage-deepagents/**"
      - ".github/workflows/verify-langchain-upstage-deepagents.yml"
  pull_request:
    paths:
      - "03-langchain-upstage-deepagents/**"
      - ".github/workflows/verify-langchain-upstage-deepagents.yml"
  workflow_dispatch: {}
  workflow_call:
    inputs:
      model:
        type: string
        required: false
        default: solar-open2

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Lint, type-check, and test (python-lint)
        working-directory: 03-langchain-upstage-deepagents/src
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run ty check .
          uv run pytest -q

      - name: Run verification
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          SOLAR_MODEL: ${{ inputs.model }}
        run: ./03-langchain-upstage-deepagents/scripts/verify.sh
